<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gold: #d4af37;
            --dark-bg: #1a1a1a;
            --card-bg: #2a2a2a;
            --text-light: #f0f0f0;
            --accent-gold: #f4d03f;
        }

        body {

            
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-light);
            line-height: 1.6;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
            border-bottom: 3px solid var(--primary-gold);
            padding: 1.5rem 1rem;
            text-align: center;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
        }

        .header-content h1 {
           
            font-size: 2rem;
            color: var(--primary-gold);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
        }

        .header-content p {
            color: var(--accent-gold);
            font-size: 0.95rem;
        }

        /* Navigation */
        nav {
            background-color: var(--card-bg);
            display: flex;
            justify-content: center;
            gap: 0;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--primary-gold);
            padding: 0;
        }

        nav button {
            background: none;
            border: none;
            color: var(--text-light);
            padding: 1rem 1.5rem;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            border-right: 1px solid rgba(212, 175, 55, 0.3);
            transition: all 0.3s ease;
            position: relative;
        }

        nav button:last-child {
            border-right: none;
        }

        nav button:hover {
            background-color: rgba(212, 175, 55, 0.1);
            color: var(--primary-gold);
        }

        nav button.active {
            color: var(--primary-gold);
            background-color: rgba(212, 175, 55, 0.15);
        }

        nav button.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background-color: var(--primary-gold);
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
        }

        /* Sections */
        section {
            display: none;
            animation: fadeIn 0.4s ease-in;
        }

        section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        section h2 {
            color: var(--primary-gold);
            font-size: 1.8rem;
            margin: 2rem 0 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--primary-gold);
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }

        /* Card Grid */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background: linear-gradient(135deg, var(--card-bg) 0%, #353535 100%);
            border: 2px solid var(--primary-gold);
            border-radius: 8px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.1);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.25);
            border-color: var(--accent-gold);
        }

        .card-rank {
            display: inline-block;
            background-color: var(--primary-gold);
            color: var(--dark-bg);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .card-title {
            color: var(--accent-gold);
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 0.8rem;
        }

        .card-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            font-size: 0.9rem;
        }

        .card-info span {
            color: var(--text-light);
        }

        .card-info-label {
            color: var(--primary-gold);
            font-weight: 600;
        }

        .price-increase {
            color: #ff6b6b;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .card-description {
            color: #c0c0c0;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* AI Judgment Buttons */
        .judgment-button {
            display: inline-block;
            padding: 0.7rem 1.2rem;
            margin-top: 1rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .judgment-button.buy {
            background-color: #2ecc71;
            color: white;
        }

        .judgment-button.buy:hover {
            background-color: #27ae60;
        }

        .judgment-button.hold {
            background-color: #f39c12;
            color: white;
        }

        .judgment-button.hold:hover {
            background-color: #e67e22;
        }

        .judgment-button.sell {
            background-color: #e74c3c;
            color: white;
        }

        .judgment-button.sell:hover {
            background-color: #c0392b;
        }

        .judgment-reason {
            display: none;
            margin-top: 1rem;
            padding: 1rem;
            background-color: rgba(212, 175, 55, 0.1);
            border-left: 3px solid var(--primary-gold);
            border-radius: 4px;
            font-size: 0.85rem;
            color: #c0c0c0;
        }

        .judgment-reason.show {
            display: block;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
        }

        .empty-state p {
            color: var(--primary-gold);
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content h1 {
                font-size: 1.5rem;
            }

            nav {
                flex-direction: column;
            }

            nav button {
                border-right: none;
                border-bottom: 1px solid rgba(212, 175, 55, 0.3);
                padding: 0.8rem 1rem;
            }

            nav button:last-child {
                border-bottom: none;
            }

            nav button.active::after {
                display: none;
            }

            nav button.active {
                background-color: rgba(212, 175, 55, 0.2);
            }

            .card-grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 0.75rem;
            }

            section h2 {
                font-size: 1.4rem;
                margin: 1.5rem 0 1rem;
            }
        }

        /* Footer */
        footer {
            background-color: var(--card-bg);

            text-align: center;
            padding: 2rem 1rem;
            margin-top: 3rem;
            color: #999;
            font-size: 0.9rem;
        }
    </style>

        // Toggle Judgment Reason
        function toggleReason(index) {
            const reason = document.getElementById(`reason-${index}`);
            reason.classList.toggle('show');
        }

        // Setup Navigation
        function setupNavigation() {
            const buttons = document.querySelectorAll('.nav-btn');
            buttons.forEach(button => {
                button.addEventListener('click', () => {
                    buttons.forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');

                    const sections = document.querySelectorAll('section');
                    sections.forEach(section => section.classList.remove('active'));
                    
                    const targetSection = document.getElementById(button.dataset.section);
                    targetSection.classList.add('active');
                });
            });
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', init);
